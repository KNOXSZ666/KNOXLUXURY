<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOX ADMIN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<div class="galaxy-bg"><div class="grid-lines"></div></div>
<div class="scanlines"></div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:20px 0; flex-wrap:wrap; gap:15px;">
        <h1 class="holo-text" style="font-size:2rem">KNOX ADMIN</h1>
        <div style="display:flex; gap:10px">
            <button class="holo-btn" onclick="backupDB()">💾 BACKUP</button>
            <button class="holo-btn danger" onclick="localStorage.removeItem('knox_user'); window.location.href='index.html'">LOGOUT</button>
        </div>
    </div>

    <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:15px; margin-bottom:30px;">
        <div class="card" style="padding:15px; text-align:center"><span style="color:var(--text-dim)">Tổng Đơn</span><h2 id="st-total-ord" class="text-accent">0</h2></div>
        <div class="card" style="padding:15px; text-align:center; border-color:var(--danger)"><span style="color:var(--text-dim)">Đơn Chờ</span><h2 id="st-pending-ord" class="text-danger">0</h2></div>
        <div class="card" style="padding:15px; text-align:center; border-color:var(--danger)"><span style="color:var(--text-dim)">Nạp Chờ</span><h2 id="st-pending-dep" class="text-danger">0</h2></div>
        <div class="card" style="padding:15px; text-align:center; border-color:var(--danger)"><span style="color:var(--text-dim)">Thẻ Chờ</span><h2 id="st-pending-card" class="text-danger">0</h2></div>
        <div class="card" style="padding:15px; text-align:center"><span style="color:var(--text-dim)">Doanh Thu</span><h2 id="st-revenue" class="text-success" style="font-size:1.2rem">0đ</h2></div>
    </div>

    <div class="card mb-2" style="padding:20px; background: rgba(0,0,0,0.5);">
        <canvas id="revenueChart" height="100"></canvas>
    </div>

    <div style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:20px;" id="admin-tabs">
        <button class="holo-btn" onclick="switchTab('orders')">Đơn Hàng</button>
        <button class="holo-btn" onclick="switchTab('deposits')">Nạp Tiền</button>
        <button class="holo-btn" onclick="switchTab('cards')">Thẻ Cào</button>
        <button class="holo-btn" onclick="switchTab('users')">Users</button>
        <button class="holo-btn" onclick="switchTab('broadcast')">Broadcast</button>
        <button class="holo-btn" onclick="switchTab('logs')">Logs</button>
    </div>

    <div class="card" id="admin-content" style="overflow-x:auto; padding:20px; background:rgba(0,0,0,0.5)">
        <div class="skeleton"></div><div class="skeleton"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://lsievokkismxxaiezdlm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzaWV2b2traXNteHhhaWV6ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjY0NzgsImV4cCI6MjA5NzAwMjQ3OH0.TZ6_NlpDIrl6xDucsc8S4hqA23RQVWsVLrQRjtr6YmQ';
    const supabase = supabase_createClient(SUPABASE_URL, SUPABASE_KEY);
    
    if(!localStorage.getItem('knox_user') || JSON.parse(localStorage.getItem('knox_user')).username !== 'admin') window.location.href = 'index.html';

    let chartInstance = null;
    function formatCurrency(n) { return (n||0).toLocaleString('vi-VN') + 'đ'; }
    async function logAdmin(action, target, details) { await supabase.from('admin_logs').insert([{ action, target, details }]); }

    setInterval(loadStats, 1000); loadStats(); initChart();

    async function loadStats() {
        try {
            const [ords, deps, cards] = await Promise.all([
                supabase.from('orders').select('status, payment'),
                supabase.from('deposits').select('status, amount'),
                supabase.from('card_deposits').select('status')
            ]);
            document.getElementById('st-total-ord').innerText = ords.data.length;
            document.getElementById('st-pending-ord').innerText = ords.data.filter(o=>o.status==='pending').length;
            document.getElementById('st-pending-dep').innerText = deps.data.filter(d=>d.status==='pending').length;
            document.getElementById('st-pending-card').innerText = cards.data.filter(c=>c.status==='pending').length;
            document.getElementById('st-revenue').innerText = formatCurrency(ords.data.filter(o=>o.status==='completed').reduce((a,b)=>a+b.payment,0));
        } catch(e){}
    }

    async function initChart() {
        const { data } = await supabase.from('deposits').select('*').eq('status','completed');
        const days = {}; data.forEach(d => { const day = d.created_at.substring(0,10); days[day] = (days[day]||0) + d.amount; });
        const labels = Object.keys(days).sort().slice(-7); const values = labels.map(l=>days[l]);
        const ctx = document.getElementById('revenueChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Doanh thu', data: values, borderColor: '#00F0FF', backgroundColor: 'rgba(0, 240, 255, 0.1)', tension: 0.1, fill: true }] }, options: { responsive: true, plugins: { legend: { labels: { color: '#e0e0e0' } } }, scales: { y: { ticks: { color: '#e0e0e0' }, grid: { color: '#1a1a2e' } }, x: { ticks: { color: '#e0e0e0' }, grid: { color: '#1a1a2e' } } } } });
    }

    let currentTab = 'orders';
    function switchTab(tab) { currentTab = tab; loadTabContent(); }
    
    async function loadTabContent() {
        const c = document.getElementById('admin-content');
        c.innerHTML = '<div class="skeleton"></div>';
        
        if(currentTab === 'orders') {
            const { data } = await supabase.from('orders').select('*').order('created_at',{ascending:false});
            c.innerHTML = `<table style="width:100%;border-collapse:collapse;text-align:center;font-size:14px"><tr style="border-bottom:2px solid var(--accent)"><th>Mã</th><th>KH</th><th>Game TK</th><th>TT</th><th>Action</th></tr>${
                data.map(o => `<tr style="border-bottom:1px solid var(--border)">
                    <td style="color:var(--accent)">${o.order_code}</td><td>${o.username}</td>
                    <td><button onclick="navigator.clipboard.writeText('${o.game_username}:${o.game_password}')" class="holo-btn" style="padding:2px 5px;font-size:10px">COPY</button></td>
                    <td><span class="badge badge-${o.status}">${o.status.toUpperCase()}</span></td>
                    <td><select onchange="updateOrderStatus('${o.id}', this.value)" style="background:var(--bg);color:var(--text);padding:5px;border:1px solid var(--border)"><option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='completed'?'selected':''}>completed</option><option ${o.status==='rejected'?'selected':''}>rejected</option></select>
                    ${o.status==='pending'?`<button onclick="rejectOrder('${o.id}','${o.username}',${o.payment})" class="holo-btn danger" style="padding:2px 5px;font-size:10px;margin-left:5px">HỦY</button>`:''}</td></tr>`).join('')
            }</table>`;
        }
        else if(currentTab === 'deposits') {
            const { data } = await supabase.from('deposits').select('*').eq('status','pending');
            c.innerHTML = data.map(d => `<div class="card mb-1" style="padding:15px; display:flex;justify-content:space-between;align-items:center">
                <div><b class="text-accent">${d.deposit_code}</b> - ${d.username} - <b class="text-success">${formatCurrency(d.amount)}</b></div>
                <div style="display:flex;gap:5px"><button onclick="approveDeposit('${d.id}','${d.username}',${d.amount})" class="holo-btn" style="padding:5px 10px">DUYỆT</button><button onclick="rejectDeposit('${d.id}')" class="holo-btn danger" style="padding:5px 10px">X</button></div>
            </div>`).join('') || '<p style="color:var(--text-dim)">Trống</p>';
        }
        else if(currentTab === 'cards') {
            const { data } = await supabase.from('card_deposits').select('*').eq('status','pending');
            c.innerHTML = data.map(d => `<div class="card mb-1" style="padding:15px">
                <div style="display:flex;justify-content:space-between"><b class="text-accent2">${d.card_code}</b> <span class="text-success">${formatCurrency(d.actual_amount)}</span></div>
                <p style="font-size:13px;margin:5px 0">${d.telco} | Seri: <span onclick="navigator.clipboard.writeText('${d.serial}')" style="cursor:pointer;color:var(--accent)">${d.serial}</span> | Code: <span onclick="navigator.clipboard.writeText('${d.code}')" style="cursor:pointer;color:var(--accent)">${d.code}</span></p>
                <button onclick="approveCard('${d.id}','${d.username}',${d.actual_amount})" class="holo-btn" style="padding:2px 10px;font-size:12px">DUYỆT</button>
                <button onclick="rejectCard('${d.id}')" class="holo-btn danger" style="padding:2px 10px;font-size:12px">X</button>
            </div>`).join('') || '<p style="color:var(--text-dim)">Trống</p>';
        }
        else if(currentTab === 'users') {
            const { data } = await supabase.from('users').select('*');
            c.innerHTML = `<table style="width:100%;border-collapse:collapse;text-align:center;font-size:14px"><tr style="border-bottom:2px solid var(--accent2)"><th>User</th><th>Số dư</th><th>Đã nạp</th><th>Action</th></tr>${
                data.map(u => `<tr style="border-bottom:1px solid var(--border)">
                    <td>${u.username} ${u.is_locked?'🔒':''}</td><td class="text-success">${formatCurrency(u.balance)}</td><td>${formatCurrency(u.total_deposited)}</td>
                    <td>
                        <button onclick="addBalance('${u.username}')" class="holo-btn" style="padding:2px 5px;font-size:10px">+TIỀN</button>
                        <button onclick="toggleLock('${u.username}', ${!u.is_locked})" class="holo-btn ${u.is_locked?'':'danger'}" style="padding:2px 5px;font-size:10px">${u.is_locked?'MỞ':'KHÓA'}</button>
                    </td></tr>`).join('')
            }</table>`;
        }
        else if(currentTab === 'broadcast') {
            c.innerHTML = `<div class="form-group"><input type="text" id="bc-title" class="form-input" placeholder="Tiêu đề"></div>
            <div class="form-group"><textarea id="bc-msg" class="form-input" placeholder="Nội dung" style="height:100px"></textarea></div>
            <button class="holo-btn" style="width:100%; padding:15px" onclick="sendBroadcast()">GỬI TẤT CẢ USER</button>`;
        }
        else if(currentTab === 'logs') {
            const { data } = await supabase.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(50);
            c.innerHTML = data.map(l => `<div class="card mb-1" style="padding:10px"><b class="text-accent2">${l.action}</b> - ${l.target}<br><small style="color:var(--text-dim)">${l.details}</small></div>`).join('');
        }
    }

    // Actions (Giữ nguyên logic lần trước, chỉ đổi class nút)
    async function updateOrderStatus(id, status) { await supabase.from('orders').update({ status }).eq('id', id); const {data:o}=await supabase.from('orders').select('username, order_code').eq('id',id).single(); await supabase.from('notifications').insert([{username:o.username, title:'Order Update', message:`${o.order_code} -> ${status}`, type:'order'}]); logAdmin('Update Order',id,status); loadTabContent();}
    async function rejectOrder(id, user, amt) { const reason=prompt('Lý do từ chối:'); if(!reason)return; await supabase.from('orders').update({status:'rejected',reject_reason:reason}).eq('id',id); const{data:u}=await supabase.from('users').select('balance').eq('username',user).single(); await supabase.from('users').update({balance:u.balance+amt}).eq('username',user); await supabase.from('notifications').insert([{username:user,title:'Đơn hủy',message:`Lý do: ${reason}. Hoàn ${formatCurrency(amt)}`,type:'order'}]); logAdmin('Reject',id,reason); loadTabContent(); loadStats();}
    async function approveDeposit(id, user, amt) { const{data:u}=await supabase.from('users').select('balance, total_deposited').eq('username',user).single(); await supabase.from('users').update({balance:u.balance+amt,total_deposited:u.total_deposited+amt}).eq('username',user); await supabase.from('deposits').update({status:'completed'}).eq('id',id); await supabase.from('notifications').insert([{username:user,title:'Nạp tiền OK',message:`+${formatCurrency(amt)}`,type:'deposit'}]); logAdmin('Approve Dep',id,''); loadTabContent(); loadStats(); initChart();}
    async function rejectDeposit(id) { await supabase.from('deposits').update({status:'rejected'}).eq('id',id); loadTabContent(); }
    async function approveCard(id, user, amt) { const{data:u}=await supabase.from('users').select('balance, total_deposited').eq('username',user).single(); await supabase.from('users').update({balance:u.balance+amt,total_deposited:u.total_deposited+amt}).eq('username',user); await supabase.from('card_deposits').update({status:'completed'}).eq('id',id); await supabase.from('notifications').insert([{username:user,title:'Thẻ duyệt',message:`+${formatCurrency(amt)}`,type:'deposit'}]); logAdmin('Approve Card',id,''); loadTabContent(); loadStats();}
    async function rejectCard(id) { await supabase.from('card_deposits').update({status:'rejected'}).eq('id',id); loadTabContent(); }
    async function addBalance(user) { const val=prompt('Số tiền (âm=trừ, =xxx=đặt cụ thể):','10000'); if(!val)return; const{data:u}=await supabase.from('users').select('balance').eq('username',user).single(); let newBal=val.startsWith('=')?parseInt(val.substring(1)):u.balance+parseInt(val); await supabase.from('users').update({balance:newBal}).eq('username',user); logAdmin('Add Bal',user,val); loadTabContent();}
    async function toggleLock(user, lock) { await supabase.from('users').update({is_locked:lock}).eq('username',user); await supabase.from('notifications').insert([{username:user,title:lock?'KHÓA':'MỞ KHÓA',message:lock?'TK bị khóa':'Đã mở khóa',type:'system'}]); logAdmin(lock?'Lock':'Unlock',user,''); loadTabContent();}
    async function sendBroadcast() { const t=document.getElementById('bc-title').value,m=document.getElementById('bc-msg').value; if(!t||!m)return; const{data:u}=await supabase.from('users').select('username'); await supabase.from('notifications').insert(u.map(x=>({username:x.username,title:t,message:m,type:'broadcast'}))); await supabase.from('broadcasts').insert([{title:t,message:m}]); logAdmin('Broadcast','All',t); alert('Đã gửi!');}
    async function backupDB() { const t=['users','orders','deposits','card_deposits']; let b={}; for(let i of t){const{data:d}=await supabase.from(i).select('*');b[i]=d;} const a=document.createElement('a'); a.href=URL.createObjectURL(new Blob([JSON.stringify(b,null,2)],{type:"application/json"})); a.download='knox_backup.json'; a.click(); logAdmin('Backup','DB','');}

    loadTabContent();
</script>
</body>
    </html>
