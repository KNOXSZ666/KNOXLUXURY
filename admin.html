<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KNOX ADMIN</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="galaxy-bg"><div class="orb orb-1"></div><div class="orb orb-2"></div><div class="stars"></div></div>

<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:20px 0;">
        <h1 class="holo-text">KNOX ADMIN</h1>
        <div>
            <button class="holo-btn" onclick="backupDB()">💾 Backup JSON</button>
            <button class="holo-btn" style="background:var(--danger)" onclick="localStorage.removeItem('knox_user'); window.location.href='index.html'">Logout</button>
        </div>
    </div>

    <!-- Stats -->
    <div class="grid-4" id="admin-stats" style="display:grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap:10px; margin-bottom:20px;">
        <div class="card"><p>Tổng Đơn</p><h2 id="st-total-ord">0</h2></div>
        <div class="card"><p>Đơn Chờ</p><h2 id="st-pending-ord" class="text-danger">0</h2></div>
        <div class="card"><p>Nạp Chờ</p><h2 id="st-pending-dep" class="text-danger">0</h2></div>
        <div class="card"><p>Thẻ Chờ</p><h2 id="st-pending-card" class="text-danger">0</h2></div>
        <div class="card"><p>Ticket Mở</p><h2 id="st-open-tkt" class="text-danger">0</h2></div>
        <div class="card"><p>Doanh Thu</p><h2 id="st-revenue" class="text-success">0đ</h2></div>
    </div>

    <!-- Chart -->
    <div class="card mb-2">
        <canvas id="revenueChart" height="100"></canvas>
    </div>

    <!-- Tabs -->
    <div style="display:flex; flex-wrap:wrap; gap:5px; margin-bottom:10px;" id="admin-tabs">
        <button class="holo-btn" onclick="switchTab('orders')">Đơn Hàng</button>
        <button class="holo-btn" onclick="switchTab('deposits')">Nạp Tiền</button>
        <button class="holo-btn" onclick="switchTab('cards')">Thẻ Cào</button>
        <button class="holo-btn" onclick="switchTab('users')">Users</button>
        <button class="holo-btn" onclick="switchTab('tickets')">Tickets</button>
        <button class="holo-btn" onclick="switchTab('scripts')">Scripts</button>
        <button class="holo-btn" onclick="switchTab('deals')">Hot Deals</button>
        <button class="holo-btn" onclick="switchTab('vouchers')">Vouchers</button>
        <button class="holo-btn" onclick="switchTab('reviews')">Reviews</button>
        <button class="holo-btn" onclick="switchTab('broadcast')">Broadcast</button>
        <button class="holo-btn" onclick="switchTab('logs')">Logs</button>
    </div>

    <div class="card" id="admin-content" style="overflow-x:auto">
        <div class="skeleton"></div><div class="skeleton"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://lsievokkismxxaiezdlm.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzaWV2b2traXNteHhhaWV6ZGxtIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE0MjY0NzgsImV4cCI6MjA5NzAwMjQ3OH0.TZ6_NlpDIrl6xDucsc8S4hqA23RQVWsVLrQRjtr6YmQ';
    const supabase = supabase_createClient(SUPABASE_URL, SUPABASE_KEY);
    
    if(!localStorage.getItem('knox_user') || JSON.parse(localStorage.getItem('knox_user')).username !== 'admin') {
        window.location.href = 'index.html';
    }

    let currentTab = 'orders';
    let chartInstance = null;

    function formatCurrency(n) { return (n||0).toLocaleString('vi-VN') + 'đ'; }
    async function logAdmin(action, target, details) { await supabase.from('admin_logs').insert([{ action, target, details }]); }

    setInterval(loadStats, 1000);
    loadStats(); initChart();

    async function loadStats() {
        try {
            const [ords, deps, cards, tkts] = await Promise.all([
                supabase.from('orders').select('status, payment'),
                supabase.from('deposits').select('status, amount'),
                supabase.from('card_deposits').select('status'),
                supabase.from('tickets').select('status')
            ]);
            
            document.getElementById('st-total-ord').innerText = ords.data.length;
            document.getElementById('st-pending-ord').innerText = ords.data.filter(o=>o.status==='pending').length;
            document.getElementById('st-pending-dep').innerText = deps.data.filter(d=>d.status==='pending').length;
            document.getElementById('st-pending-card').innerText = cards.data.filter(c=>c.status==='pending').length;
            document.getElementById('st-open-tkt').innerText = tkts.data.filter(t=>t.status==='open').length;
            document.getElementById('st-revenue').innerText = formatCurrency(ords.data.filter(o=>o.status==='completed').reduce((a,b)=>a+b.payment,0));
        } catch(e){}
    }

    async function initChart() {
        const { data } = await supabase.from('deposits').select('*').eq('status','completed');
        const days = {};
        data.forEach(d => { const day = d.created_at.substring(0,10); days[day] = (days[day]||0) + d.amount; });
        const labels = Object.keys(days).sort().slice(-7);
        const values = labels.map(l=>days[l]);
        
        const ctx = document.getElementById('revenueChart').getContext('2d');
        if(chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, { type: 'line', data: { labels, datasets: [{ label: 'Doanh thu', data: values, borderColor: '#20D6F7', tension: 0.1 }] }, options: { responsive: true } });
    }

    function switchTab(tab) { currentTab = tab; loadTabContent(); }
    async function loadTabContent() {
        const c = document.getElementById('admin-content');
        c.innerHTML = '<div class="skeleton"></div>';
        
        if(currentTab === 'orders') {
            const { data } = await supabase.from('orders').select('*').order('created_at', {ascending:false});
            c.innerHTML = `<table style="width:100%;border-collapse:collapse"><tr style="border-bottom:1px solid var(--border)"><th>Mã</th><th>KH</th><th>DV</th><th>Game TK</th><th>TT</th><th>Hành Động</th></tr>${
                data.map(o => `<tr style="border-bottom:1px solid var(--border);text-align:center">
                    <td>${o.order_code}</td><td>${o.username}</td><td>${o.service}</td>
                    <td><button onclick="navigator.clipboard.writeText('${o.game_username}:${o.game_password}')" class="holo-btn" style="padding:2px 5px;font-size:10px">Copy</button></td>
                    <td><select onchange="updateOrderStatus('${o.id}', this.value)" style="background:var(--bg);color:var(--text);padding:5px;">
                        <option ${o.status==='pending'?'selected':''}>pending</option><option ${o.status==='completed'?'selected':''}>completed</option><option ${o.status==='rejected'?'selected':''}>rejected</option>
                    </select></td>
                    <td>${o.status==='pending'?`<button onclick="rejectOrder('${o.id}','${o.username}',${o.payment})" class="text-danger">Hủy</button>`:''}</td>
                </tr>`).join('')
            }</table>`;
        }
        else if(currentTab === 'deposits') {
            const { data } = await supabase.from('deposits').select('*').eq('status','pending');
            c.innerHTML = data.map(d => `<div class="card mb-1" style="display:flex;justify-content:space-between;align-items:center">
                <div>${d.deposit_code} - ${d.username} - <b class="text-success">${formatCurrency(d.amount)}</b></div>
                <div><button onclick="approveDeposit('${d.id}','${d.username}',${d.amount})" class="holo-btn" style="padding:5px">Duyệt</button> <button onclick="rejectDeposit('${d.id}')" class="text-danger">X</button></div>
            </div>`).join('') || 'Không có yêu cầu';
        }
        else if(currentTab === 'cards') {
            const { data } = await supabase.from('card_deposits').select('*').eq('status','pending');
            c.innerHTML = data.map(d => `<div class="card mb-1">
                <div style="display:flex;justify-content:space-between"><b>${d.card_code}</b> <span class="text-success">${formatCurrency(d.actual_amount)}</span></div>
                <p>${d.telco} - Seri: <span onclick="navigator.clipboard.writeText('${d.serial}')" style="cursor:pointer;color:var(--accent)">${d.serial}</span> - Code: <span onclick="navigator.clipboard.writeText('${d.code}')" style="cursor:pointer;color:var(--accent)">${d.code}</span></p>
                <button onclick="approveCard('${d.id}','${d.username}',${d.actual_amount})" class="holo-btn" style="padding:5px">Duyệt</button>
                <button onclick="rejectCard('${d.id}')" class="text-danger">X</button>
            </div>`).join('') || 'Không có thẻ';
        }
        else if(currentTab === 'users') {
            const { data } = await supabase.from('users').select('*');
            c.innerHTML = `<table style="width:100%;border-collapse:collapse"><tr><th>User</th><th>Số dư</th><th>Đã nạp</th><th>Pass</th><th>Hành động</th></tr>${
                data.map(u => `<tr style="border-bottom:1px solid var(--border);text-align:center">
                    <td>${u.username} ${u.is_locked?'🔒':''}</td><td>${formatCurrency(u.balance)}</td><td>${formatCurrency(u.total_deposited)}</td>
                    <td><code>${u.password.substring(0,3)}***</code></td>
                    <td>
                        <button onclick="addBalance('${u.username}')" class="holo-btn" style="padding:2px;font-size:10px">+Tiền</button>
                        <button onclick="resetPass('${u.username}')" style="padding:2px;font-size:10px;background:var(--accent)">MK</button>
                        <button onclick="toggleLock('${u.username}', ${!u.is_locked})" style="padding:2px;font-size:10px;background:${u.is_locked?'var(--success)':'var(--danger)'}">${u.is_locked?'Mở':'Khóa'}</button>
                    </td>
                </tr>`).join('')
            }</table>`;
        }
        else if(currentTab === 'broadcast') {
            c.innerHTML = `<div class="form-group"><input type="text" id="bc-title" class="form-input" placeholder="Tiêu đề"></div>
            <div class="form-group"><textarea id="bc-msg" class="form-input" placeholder="Nội dung"></textarea></div>
            <button class="holo-btn" onclick="sendBroadcast()">Gửi tất cả user</button>`;
        }
        else if(currentTab === 'logs') {
            const { data } = await supabase.from('admin_logs').select('*').order('created_at',{ascending:false}).limit(100);
            c.innerHTML = data.map(l => `<div class="card mb-1"><b>${l.action}</b> - ${l.target}<br><small>${l.details}</small></div>`).join('');
        }
        else {
            c.innerHTML = 'Chức năng đang được cập nhật giao diện admin...';
        }
    }

    // Admin Actions
    async function updateOrderStatus(id, status) {
        await supabase.from('orders').update({ status, progress: status==='completed'?100:0 }).eq('id', id);
        const {data:o} = await supabase.from('orders').select('username, order_code').eq('id',id).single();
        await supabase.from('notifications').insert([{ username: o.username, title: 'Đơn hàng cập nhật', message: `Đơn ${o.order_code} -> ${status}`, type: 'order' }]);
        logAdmin('Update Order', id, status);
        loadTabContent();
    }

    async function rejectOrder(id, user, amt) {
        const reason = prompt('Lý do từ chối:');
        if(!reason) return;
        await supabase.from('orders').update({ status: 'rejected', reject_reason: reason }).eq('id', id);
        const {data:u} = await supabase.from('users').select('balance').eq('username',user).single();
        await supabase.from('users').update({ balance: u.balance + amt }).eq('username', user);
        await supabase.from('notifications').insert([{ username: user, title: 'Đơn bị hủy', message: `Lý do: ${reason}. Hoàn ${formatCurrency(amt)}`, type: 'order' }]);
        logAdmin('Reject Order', id, reason);
        loadTabContent(); loadStats();
    }

    async function approveDeposit(id, user, amt) {
        const {data:u} = await supabase.from('users').select('balance, total_deposited').eq('username',user).single();
        await supabase.from('users').update({ balance: u.balance + amt, total_deposited: u.total_deposited + amt }).eq('username', user);
        await supabase.from('deposits').update({ status: 'completed' }).eq('id', id);
        await supabase.from('notifications').insert([{ username: user, title: 'Nạp tiền thành công', message: `+${formatCurrency(amt)}`, type: 'deposit' }]);
        logAdmin('Approve Deposit', id, '');
        loadTabContent(); loadStats(); initChart();
    }

    async function rejectDeposit(id) { await supabase.from('deposits').update({ status: 'rejected' }).eq('id', id); loadTabContent(); }

    async function approveCard(id, user, amt) {
        const {data:u} = await supabase.from('users').select('balance, total_deposited').eq('username',user).single();
        await supabase.from('users').update({ balance: u.balance + amt, total_deposited: u.total_deposited + amt }).eq('username', user);
        await supabase.from('card_deposits').update({ status: 'completed' }).eq('id', id);
        await supabase.from('notifications').insert([{ username: user, title: 'Thẻ cào duyệt', message: `+${formatCurrency(amt)}`, type: 'deposit' }]);
        logAdmin('Approve Card', id, '');
        loadTabContent(); loadStats();
    }
    async function rejectCard(id) { const note = prompt('Lý do:'); await supabase.from('card_deposits').update({ status: 'rejected', admin_note: note }).eq('id', id); loadTabContent(); }

    async function addBalance(user) {
        const val = prompt('Nhập số (âm=trừ, =xxx=đặt cụ thể):', '10000');
        if(!val) return;
        const {data:u} = await supabase.from('users').select('balance').eq('username',user).single();
        let newBal = val.startsWith('=') ? parseInt(val.substring(1)) : u.balance + parseInt(val);
        await supabase.from('users').update({ balance: newBal }).eq('username', user);
        logAdmin('Add Balance', user, val);
        loadTabContent();
    }

    async function resetPass(user) {
        const np = prompt('Mật khẩu mới:');
        if(!np) return;
        await supabase.from('users').update({ password: np }).eq('username', user);
        await supabase.from('notifications').insert([{ username: user, title: 'Reset MK', message: 'Mật khẩu đã được admin thay đổi', type: 'system' }]);
        logAdmin('Reset Pass', user, '');
        loadTabContent();
    }

    async function toggleLock(user, lock) {
        await supabase.from('users').update({ is_locked: lock }).eq('username', user);
        await supabase.from('notifications').insert([{ username: user, title: lock?'Khóa TK':'Mở TK', message: lock?'Tài khoản bị khóa':'Đã mở khóa', type: 'system' }]);
        logAdmin(lock?'Lock':'Unlock', user, '');
        loadTabContent();
    }

    async function sendBroadcast() {
        const title = document.getElementById('bc-title').value;
        const msg = document.getElementById('bc-msg').value;
        if(!title || !msg) return;
        const { data: users } = await supabase.from('users').select('username');
        const notifs = users.map(u => ({ username: u.username, title, message: msg, type: 'broadcast' }));
        await supabase.from('notifications').insert(notifs);
        await supabase.from('broadcasts').insert([{ title, message: msg }]);
        logAdmin('Broadcast', 'All', title);
        alert('Đã gửi!');
    }

    async function backupDB() {
        const tables = ['users','orders','deposits','card_deposits','scripts','hot_deals','vouchers','reviews','tickets','notifications'];
        let backup = {};
        for(let t of tables) { const { data } = await supabase.from(t).select('*'); backup[t] = data; }
        const blob = new Blob([JSON.stringify(backup, null, 2)], {type: "application/json"});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a'); a.href = url; a.download = 'knox_backup.json'; a.click();
        logAdmin('Backup', 'DB', '');
    }

    loadTabContent();
</script>
</body>
    </html>
